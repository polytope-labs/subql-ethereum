name: Polytopelabs Docker Publish

on:
  push:
    tags:
      - "node-ethereum/v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      isLatest:
        description: "Add latest tag"
        default: "true"
        required: true

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
  build_and_publish:
    runs-on: release-runner
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 100
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      ## node
      - name: Get updated node version
        id: get-node-version
        run: |
          sh .github/workflows/scripts/nodeVersion.sh

      - run: yarn
      - name: build
        run: yarn build

      - name: Build and push
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.isLatest == 'false'
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          platforms: arm64,amd64
          file: ./packages/node/Dockerfile
          tags: polytopelabs/subql-node-ethereum:v${{ steps.get-node-version.outputs.NODE_VERSION }}
          build-args: RELEASE_VERSION=${{ steps.get-node-version.outputs.NODE_VERSION }}

      - name: Build and push
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.isLatest == 'true')
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          platforms: arm64,amd64
          file: ./packages/node/Dockerfile
          tags: polytopelabs/subql-node-ethereum:v${{ steps.get-node-version.outputs.NODE_VERSION }},polytopelabs/subql-node-ethereum:latest
          build-args: RELEASE_VERSION=${{ steps.get-node-version.outputs.NODE_VERSION }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
